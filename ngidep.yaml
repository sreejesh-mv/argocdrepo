apiVersion: apps/v1
kind: Deployment
metadata:
  name: sree-nginx
  namespace: sreejesh
  annotations:
    kubernetes.io/change-cause: "image tag updating to caddynline-perl for nginx"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: c1
        image: sreejeshmv123/demo-nginx:0247f873c0065d933030aa9275ee64bc47cb0f24
      - name: c2
        image: sreejeshmv123/demo-nginx:0247f873c0065d933030aa9275ee64bc47cb0f24
